name: Veille Souverainete Numerique

on:
  schedule:
    - cron: "0 7 1 * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Raison du declenchement manuel (facultatif)"
        required: false
        default: "Test manuel"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-veille:
    name: Générer et envoyer le rapport
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Configurer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dependances Python
        run: pip install anthropic

      - name: Verifier les secrets
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then echo "ERREUR : ANTHROPIC_API_KEY manquant" && exit 1; fi
          if [ -z "$EMAIL_FROM" ];        then echo "ERREUR : EMAIL_FROM manquant"        && exit 1; fi
          if [ -z "$EMAIL_TO" ];          then echo "ERREUR : EMAIL_TO manquant"          && exit 1; fi
          if [ -z "$EMAIL_PASSWORD" ];    then echo "ERREUR : EMAIL_PASSWORD manquant"    && exit 1; fi
          echo "Tous les secrets sont presents."
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}

      - name: Executer send_veille_websearch.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
        run: python send_veille_websearch.py

      - name: Resume succes
        if: success()
        run: |
          echo "## Rapport envoye avec succes" >> $GITHUB_STEP_SUMMARY
          echo "Date : $(date '+%d/%m/%Y %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "Destinataire : ${{ secrets.EMAIL_TO }}" >> $GITHUB_STEP_SUMMARY

      - name: Resume echec
        if: failure()
        run: |
          echo "## Echec de l'envoi du rapport" >> $GITHUB_STEP_SUMMARY
          echo "Verifiez les secrets GitHub et les logs ci-dessus." >> $GITHUB_STEP_SUMMARY
